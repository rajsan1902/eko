{% extends 'farm/base.html' %}
{% block content %}
<div class="card">
    <div class="card-header bg-success text-white">
        <h4>{{ title }}</h4>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            {% for field in form %}
            <div class="form-group mb-3">
                <label for="{{ field.id_for_label }}" class="form-label">
                    {{ field.label }}
                    {% if field.field.required %}
                        <span class="text-danger">*</span>
                    {% endif %}
                </label>
                {{ field }}
                {% if field.help_text %}
                    <small class="form-text text-muted">{{ field.help_text }}</small>
                {% endif %}
                {% if field.errors %}
                    <div class="alert alert-danger mt-1">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn btn-success">Save</button>
            <a href="{% url 'batch_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

<style>
    /* Style the form inputs */
    input, select, textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }
    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #28a745;
    }
</style>
<script>
    // Get the input elements
    const bagsInput = document.getElementById('id_number_of_bags');
    const spawnsInput = document.getElementById('id_no_spawns_used');

    // Add event listener to bags input
    bagsInput.addEventListener('input', function() {
        let bags = parseFloat(this.value);

        if (!isNaN(bags) && bags > 0) {
            let spawns = bags / 2;
            spawnsInput.value = spawns;
        } else {
            spawnsInput.value = '';
        }
    });
</script>
{% endblock %}
